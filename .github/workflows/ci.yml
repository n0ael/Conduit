# Sanitizer-CI (CLAUDE.md 13.4) — TSan ist unter Windows nicht verfügbar,
# daher laufen TSan und ASan auf Ubuntu-Runnern bei jedem Push.
# Die Tests laufen headless ohne Audio-Device — kein ASIO/JACK-Setup nötig.
name: CI

# claude/**: Remote-Sessions können nicht lokal bauen (Egress-Policy blockt
# FetchContent) — die CI ist dort die Build- und Test-Verifikation pro Commit.
on:
  push:
    branches: [master, 'claude/**']
  pull_request:
    branches: [master]

jobs:
  sanitizers:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          # halt_on_error=1: jedes Data Race bricht den Lauf sofort rot ab
          - preset: tsan
            tsan-options: halt_on_error=1
            asan-options: ""
          # detect_leaks=0: LSan würde JUCE-Singletons melden — Leak-Erkennung
          # übernimmt der JUCE-LeakDetector in den Klassen selbst
          - preset: asan-linux
            tsan-options: ""
            asan-options: detect_leaks=0

    steps:
      - uses: actions/checkout@v6

      - name: JUCE-Linux-Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang pkg-config \
            libasound2-dev libjack-jackd2-dev \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev

      - name: FetchContent-Sources cachen (JUCE + Catch2)
        uses: actions/cache@v5
        with:
          path: build-*/_deps/*-src
          key: deps-src-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build (Test-Targets — die GUI-App braucht die CI nicht)
        run: cmake --build --preset ${{ matrix.preset }} --target ConduitTests --target ConduitAirwindowsTests

      - name: Tests unter ${{ matrix.preset }}
        env:
          TSAN_OPTIONS: ${{ matrix.tsan-options }}
          ASAN_OPTIONS: ${{ matrix.asan-options }}
        run: ctest --preset ${{ matrix.preset }}

  # ConduitRemote (Ableton Remote Script, Tools/Live) — pytest gegen den
  # Live-Stub. Lokal kollidieren die Manager-Tests mit einer laufenden
  # Live-Instanz (Port 9010) — hier laufen immer alle.
  remote-script:
    name: pytest ConduitRemote
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: pytest
        working-directory: Tools/Live
        run: |
          python -m pip install --quiet pytest
          python -m pytest ConduitRemote/tests -q
